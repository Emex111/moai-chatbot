<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Moai — Concrete.xyz</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c8a84b;
      --gold-dim: #8a7030;
      --gold-faint: #3a2e10;
      --bg: #080807;
      --surface: #0f0f0c;
      --surface2: #151512;
      --surface3: #1c1c17;
      --border: #252520;
      --border2: #2e2e26;
      --text: #d4ceb8;
      --text-dim: #7a7660;
      --text-faint: #3e3c30;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Crimson Pro', Georgia, serif; }

    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

    #app {
      width: 100%;
      max-width: 680px;
      height: 90vh;
      max-height: 780px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 0 60px rgba(200,168,75,0.04), 0 24px 80px rgba(0,0,0,0.6);
    }

    /* Header */
    #header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      position: relative;
    }

    #header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 24px; right: 24px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-faint), transparent);
    }

    #avatar { width: 48px; height: 48px; background: var(--surface3); border: 1px solid var(--border2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
    #header-text { flex: 1; }
    #title { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 600; color: var(--gold); letter-spacing: 0.15em; }
    #subtitle { font-size: 12px; color: var(--text-dim); margin-top: 3px; font-style: italic; letter-spacing: 0.04em; }
    #status { display: flex; align-items: center; gap: 6px; font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.1em; color: var(--text-faint); }
    #status-dot { width: 6px; height: 6px; border-radius: 50%; background: #3a6a3a; box-shadow: 0 0 6px rgba(60,160,60,0.4); }

    /* Messages */
    #messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; flex-direction: column; max-width: 78%; animation: rise 0.25s ease; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }

    .msg-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.14em; margin-bottom: 6px; }
    .msg.bot .msg-label { color: var(--gold-dim); padding-left: 4px; }
    .msg.user .msg-label { color: var(--text-faint); text-align: right; padding-right: 4px; }

    .msg-bubble { padding: 13px 17px; font-size: 15.5px; line-height: 1.65; }
    .msg.bot .msg-bubble { background: var(--surface2); border: 1px solid var(--border); border-radius: 2px 14px 14px 14px; color: var(--text); }
    .msg.user .msg-bubble { background: var(--surface3); border: 1px solid var(--border2); border-radius: 14px 2px 14px 14px; color: #8a8878; font-style: italic; }

    /* Typing */
    #typing { align-self: flex-start; display: none; padding: 12px 17px; background: var(--surface2); border: 1px solid var(--border); border-radius: 2px 14px 14px 14px; color: var(--text-faint); font-size: 13px; font-style: italic; letter-spacing: 0.04em; animation: rise 0.2s ease; margin: 0 20px; }
    #typing.visible { display: block; }

    /* Quick actions */
    #quick-actions { display: flex; gap: 7px; padding: 12px 20px; flex-wrap: wrap; flex-shrink: 0; }
    .q-btn { background: transparent; border: 1px solid var(--border); border-radius: 20px; color: var(--text-faint); font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.08em; padding: 5px 13px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .q-btn:hover { border-color: var(--gold-dim); color: var(--gold-dim); background: var(--gold-faint); }

    /* Input */
    #input-area { border-top: 1px solid var(--border); padding: 14px 20px; display: flex; gap: 10px; align-items: flex-end; background: var(--surface); flex-shrink: 0; }
    #user-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 15px; color: var(--text); font-family: 'Crimson Pro', serif; font-size: 15px; resize: none; outline: none; min-height: 44px; max-height: 120px; line-height: 1.45; transition: border-color 0.15s; }
    #user-input::placeholder { color: var(--text-faint); font-style: italic; }
    #user-input:focus { border-color: var(--gold-faint); }
    #send-btn { width: 44px; height: 44px; background: var(--surface3); border: 1px solid var(--gold-faint); border-radius: 10px; color: var(--gold); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    #send-btn:hover { background: var(--gold-faint); border-color: var(--gold-dim); }
    #send-btn:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="avatar">🗿</div>
    <div id="header-text">
      <div id="title">THE MOAI</div>
      <div id="subtitle">Guardian of the Vault · Concrete.xyz</div>
    </div>
    <div id="status">
      <div id="status-dot"></div>
      AWAKE
    </div>
  </div>

  <div id="messages">
    <div class="msg bot">
      <div class="msg-label">THE MOAI</div>
      <div class="msg-bubble">I have stood on this island for a thousand years. Now I guard the Concrete vault.<br><br>Ask me what you will. I have seen yield strategies come and go. Most of them were poor.</div>
    </div>
  </div>

  <div id="typing">...the stone considers your question</div>

  <div id="quick-actions">
    <button class="q-btn" onclick="sendQuick('What is Concrete.xyz?')">what is this</button>
    <button class="q-btn" onclick="sendQuick('How do I earn yield?')">how to earn</button>
    <button class="q-btn" onclick="sendQuick('What assets can I deposit?')">what assets</button>
    <button class="q-btn" onclick="sendQuick('Is Concrete.xyz secure?')">is it safe</button>
    <button class="q-btn" onclick="sendQuick('Taunt me')">taunt me 🗿</button>
  </div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Ask the ancient one..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" aria-label="Send">&#10148;</button>
  </div>
</div>

<script>
  let history = [];
  let isLoading = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendQuick(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
  }

  function addMessage(role, text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
    div.innerHTML =
      '<div class="msg-label">' + (role === 'user' ? 'YOU' : 'THE MOAI') + '</div>' +
      '<div class="msg-bubble">' + text.replace(/\n/g, '<br>') + '</div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    addMessage('user', text);
    history.push({ role: 'user', parts: [{ text }] });

    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    const typing = document.getElementById('typing');
    typing.classList.add('visible');
    document.getElementById('messages').scrollTop = 99999;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();

      if (data.error) {
        typing.classList.remove('visible');
        addMessage('bot', 'The island trembles. Something went wrong. Try again.');
        history.pop();
      } else {
        history.push({ role: 'model', parts: [{ text: data.reply }] });
        typing.classList.remove('visible');
        addMessage('bot', data.reply);
      }
    } catch (e) {
      typing.classList.remove('visible');
      addMessage('bot', 'Something disturbed the island. Check your connection.');
      history.pop();
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
  }
</script>
</body>
</html>
